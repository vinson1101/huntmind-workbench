# ═══════════════════════════════════════════════
# 模板选择规则
# 优先级：行业+职位双重匹配 > 纯职位匹配 > 候选人角色匹配
# ═══════════════════════════════════════════════

template_selection:

  # — 产品序列 —

  # 互联网/科技 × 产品
  - when:
      jd_industry_contains_any: ["互联网", "人工智能", "芯片半导体", "软件"]
      jd_title_contains_any: ["高级产品经理", "资深产品经理"]
    use: tech_senior_product

  - when:
      jd_industry_contains_any: ["互联网", "人工智能", "芯片半导体", "软件"]
      jd_title_contains_any: ["产品经理", "产品负责人"]
    use: tech_product_manager

  # 金融/游戏 × 产品
  - when:
      jd_industry_contains_any: ["金融", "游戏", "咨询服务"]
      jd_title_contains_any: ["产品经理", "高级产品经理"]
    use: fintech_product_manager

  # 汽车/制造 × 产品
  - when:
      jd_industry_contains_any: ["汽车", "智能制造", "大基建", "化工材料", "物流"]
      jd_title_contains_any: ["产品经理", "产品工程师"]
    use: auto_product_manager

  # 消费品 × 产品
  - when:
      jd_industry_contains_any: ["消费品", "文旅", "消费电子"]
      jd_title_contains_any: ["产品经理", "品牌产品"]
    use: consumer_product_manager

  # 医疗/能源/新兴 × 产品
  - when:
      jd_industry_contains_any: ["大健康", "能源环保农业"]
      jd_title_contains_any: ["产品经理", "高级产品经理"]
    use: emerging_product_manager

  # — 研发序列 —

  - when:
      jd_industry_contains_any: ["互联网", "人工智能", "软件"]
      jd_title_contains_any: ["研发", "工程师", "算法", "架构师", "开发"]
    use: tech_rd_engineer

  - when:
      jd_industry_contains_any: ["金融", "游戏"]
      jd_title_contains_any: ["研发", "工程师", "量化", "交易系统"]
    use: fintech_rd_engineer

  - when:
      jd_industry_contains_any: ["汽车", "智能制造", "芯片半导体"]
      jd_title_contains_any: ["研发", "工程师", "硬件", "嵌入式", "工艺"]
    use: auto_rd_engineer

  # — 运营序列 —

  - when:
      jd_industry_contains_any: ["互联网", "人工智能", "软件"]
      jd_title_contains_any: ["运营", "增长", "用户运营", "内容运营"]
    use: tech_ops_manager

  - when:
      jd_industry_contains_any: ["金融", "游戏"]
      jd_title_contains_any: ["运营", "合规运营", "风险运营", "客服"]
    use: fintech_ops_manager

  - when:
      jd_industry_contains_any: ["汽车", "智能制造", "物流"]
      jd_title_contains_any: ["运营", "供应链运营", "生产运营", "质量运营"]
    use: auto_ops_manager

  # — 商务/销售序列 —

  - when:
      jd_industry_contains_any: ["互联网", "人工智能", "软件"]
      jd_title_contains_any: ["销售总监", "商务总监", "渠道总监", "Sales Director"]
    use: tech_sales_director

  - when:
      jd_industry_contains_any: ["汽车", "智能制造", "金融"]
      jd_title_contains_any: ["销售总监", "大客户总监", "Sales Director"]
    use: senior_sales_director

  - when:
      jd_industry_contains_any: ["消费品", "文旅", "物流"]
      jd_title_contains_any: ["销售总监", "渠道总监", "代理", "经销商"]
    use: consumer_sales_director

  # — 职能序列 —

  - when:
      jd_industry_contains_any: ["互联网", "人工智能", "软件"]
      jd_title_contains_any: ["HR总监", "人力资源总监", "组织发展", "HRD"]
    use: tech_hr_director

  - when:
      jd_industry_contains_any: ["金融", "游戏"]
      jd_title_contains_any: ["财务总监", "CFO", "风控总监", "合规总监"]
    use: fintech_finance_director

  # — 通用兜底（无行业信息时）—

  - when:
      jd_title_contains_any: ["高级产品经理", "资深产品经理", "产品专家"]
    use: tech_senior_product

  - when:
      jd_title_contains_any: ["产品经理", "B端产品", "C端产品", "产品负责人"]
    use: b2b_product_general

  - when:
      jd_title_contains_any: ["研发", "工程师", "开发", "算法"]
    use: tech_rd_engineer

  - when:
      jd_title_contains_any: ["销售总监", "大客户总监", "Sales Director", "商务总监"]
    use: senior_sales_director

  - when:
      jd_title_contains_any: ["运营", "增长", "用户运营"]
    use: tech_ops_manager

  - when:
      jd_title_contains_any: ["产品助理", "校招", "应届"]
    use: campus_product

  - when:
      candidate_role_contains_any: ["项目经理", "实施工程师", "解决方案"]
    use: transition_to_product

# ═══════════════════════════════════════════════
