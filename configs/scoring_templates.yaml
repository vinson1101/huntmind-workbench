# ═══════════════════════════════════════════════

industry_adjustments:

  automotive:
    add:
      hard_skill_match: 10
      experience_depth: 5
      stability: 5
      innovation_potential: -5
      willingness: -5

  north_america_based:
    add:
      willingness: 10
      stability: 5
      hard_skill_match: -5

  healthcare:
    add:
      hard_skill_match: 5
      experience_depth: 5
      stability: 5

  innovation_heavy:
    add:
      innovation_potential: 5
      execution_goal_breakdown: 5
      experience_depth: -5
      stability: -5

  delivery_heavy:
    add:
      execution_goal_breakdown: 5
      team_fit: 5
      innovation_potential: -5
